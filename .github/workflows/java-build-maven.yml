name: Build (Maven)

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version to use."
        required: false
        type: string
        default: "21"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - run: mvn clean verify
