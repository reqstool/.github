name: Build (TypeScript)

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use."
        required: false
        type: string
        default: "24"
      use-xvfb:
        description: "Wrap test commands with xvfb-run (required for VS Code extension tests)."
        required: false
        type: boolean
        default: false
      dependency-version:
        description: "Version of an external tool to install before tests (e.g. a CLI the extension bundles). Empty = skip."
        required: false
        type: string
        default: ""
      dependency-install-command:
        description: >
          Shell command to install the dependency. Use {version} as a placeholder
          for the dependency-version value (e.g. 'pipx install mytool=={version}').
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - run: npm ci

      - name: Install dependency
        if: ${{ inputs.dependency-version != '' && inputs.dependency-install-command != '' }}
        run: |
          CMD="${{ inputs.dependency-install-command }}"
          CMD="${CMD/\{version\}/${{ inputs.dependency-version }}}"
          eval "$CMD"

      - name: Run tests
        if: ${{ !inputs.use-xvfb }}
        run: npm run test

      - name: Run tests (headless display)
        if: ${{ inputs.use-xvfb }}
        run: |
          xvfb-run --auto-servernum npm run test-with-report
          xvfb-run --auto-servernum npm run test:ui

      - run: npm run build

      - name: Upload VSIX artifact
        if: ${{ hashFiles('*.vsix') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: "*.vsix"

      - name: Upload dist artifact
        if: ${{ hashFiles('*.vsix') == '' && hashFiles('dist/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
