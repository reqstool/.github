name: Lint (Java)

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version to use."
        required: false
        type: string
        default: "21"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - run: mvn clean validate
