name: Publish to npm

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Project root relative to repo root. Default '.' for repo-root projects."
        required: false
        type: string
        default: "."
      dry-run:
        description: "Run npm publish --dry-run."
        required: false
        type: boolean
        default: false
      scope:
        description: "npm scope (with @, e.g. @reqstool)."
        required: false
        type: string
        default: "@reqstool"
      access:
        description: "npm publish access level."
        required: false
        type: string
        default: "public"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: ${{ inputs.scope }}

      - run: npm ci

      - name: Set version from tag
        if: ${{ github.ref_type == 'tag' }}
        env:
          TAG: ${{ github.ref_name }}
        run: npm version "$TAG" --no-git-tag-version

      - run: npm run build

      - name: Publish
        if: ${{ !inputs.dry-run }}
        env:
          ACCESS: ${{ inputs.access }}
        run: npm publish --provenance --access "$ACCESS"

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run }}
        env:
          ACCESS: ${{ inputs.access }}
        run: npm publish --provenance --access "$ACCESS" --dry-run
