name: Build (Python / Poetry)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Project root relative to repo root. Default '.' for repo-root projects."
        required: false
        type: string
        default: "."
      python-version:
        description: "Python version to use."
        required: false
        type: string
        default: "3.13"
      poetry-version:
        description: "Poetry version to install."
        required: false
        type: string
        default: "2.1.0"
      coverage-source:
        description: "Package name passed to --cov=<name>. Empty = run tests without coverage."
        required: false
        type: string
        default: ""
      install-self-as-plugin:
        description: "Build wheel and install it into Poetry before running tests (for plugin e2e tests)."
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ inputs.poetry-version }}
          virtualenvs-create: true

      - run: poetry self add "poetry-dynamic-versioning[plugin]"

      - run: poetry install --with dev

      - name: Build wheel and install as Poetry plugin
        if: ${{ inputs.install-self-as-plugin }}
        run: |
          poetry build --format wheel
          poetry self add "$(find dist -name '*.whl' | sort | tail -1)"

      - name: Run tests (with coverage)
        if: ${{ inputs.coverage-source != '' }}
        run: |
          poetry run pytest \
            --junitxml=build/junit.xml \
            --cov=${{ inputs.coverage-source }} \
            --cov-report=xml:build/coverage.xml

      - name: Run tests (without coverage)
        if: ${{ inputs.coverage-source == '' }}
        run: poetry run pytest --junitxml=build/junit.xml

      - name: Build
        run: poetry build

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: ${{ inputs.working-directory }}/dist/
