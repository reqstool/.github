name: Build (Gradle)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Project root relative to repo root. Default '.' for repo-root projects."
        required: false
        type: string
        default: "."
      java-version:
        description: "JDK version to use."
        required: false
        type: string
        default: "21"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - run: ./gradlew clean build
